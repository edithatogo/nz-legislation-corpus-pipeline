name: Historical Hugging Face upload

on:
  workflow_dispatch:
    inputs:
      upload_confirmed:
        description: "Actually upload to HF_HISTORICAL_REPO_ID; false performs a no-upload dry run"
        type: boolean
        default: false
      search_terms:
        description: "Comma-separated search terms for seed discovery"
        type: string
        default: "act,bill,regulation,order,notice"
      legislation_status:
        description: "Status filter; use none to omit"
        type: string
        default: "none"
      legislation_types:
        description: "Comma-separated legislation types"
        type: string
        default: "act,bill,secondary_legislation,amendment_paper"
      max_pages:
        description: "Optional page limit per search/type query"
        type: string
        default: "2"
      max_works:
        description: "Total discovered-work and sync limit"
        type: string
        default: "50"
      seed_work_ids_path:
        description: "Optional checked-in reviewed seed/batch file. If set, discovery is skipped."
        type: string
        default: ""
      merge_policy:
        description: "Historical merge policy: restore_merge, replace_existing, or no_restore_incremental"
        type: choice
        options:
          - restore_merge
          - replace_existing
          - no_restore_incremental
        default: restore_merge
      min_seconds_between_requests:
        description: "Optional request spacing override in seconds"
        type: string
        default: "0.5"
      upload_options:
        description: "Optional comma-separated upload options: force,private"
        type: string
        default: ""

concurrency:
  group: historical-hf-upload-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  historical-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HISTORICAL_OUTPUT_DIR: data-historical-upload
    steps:
      - uses: actions/checkout@v6

      - name: Guard historical dataset target
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          if [ -z "${HF_HISTORICAL_REPO_ID:-}" ]; then
            echo "HF_HISTORICAL_REPO_ID must be configured as a repository variable." >&2
            exit 1
          fi
          if [ -n "${HF_REPO_ID:-}" ] && [ "$HF_HISTORICAL_REPO_ID" = "$HF_REPO_ID" ]; then
            echo "HF_HISTORICAL_REPO_ID must not equal HF_REPO_ID." >&2
            exit 1
          fi
          case "$HF_HISTORICAL_REPO_ID" in
            "edithatogo/nz-legislation-corpus")
              echo "Refusing to write historical outputs to the live partial dataset." >&2
              exit 1
              ;;
          esac
          {
            echo "Historical dataset target: $HF_HISTORICAL_REPO_ID"
            echo "Upload confirmed: ${{ inputs.upload_confirmed }}"
            echo "Seed work IDs path: ${{ inputs.seed_work_ids_path }}"
            echo "Merge policy: ${{ inputs.merge_policy }}"
            echo "Upload options: ${{ inputs.upload_options }}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.upload_confirmed }}" = "true" ] && \
             [ "${{ inputs.merge_policy }}" = "no_restore_incremental" ]; then
            echo "Confirmed incremental upload requires merge_policy=restore_merge unless merge_policy=replace_existing." >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Discover historical seed
        if: ${{ inputs.seed_work_ids_path == '' }}
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_SEARCH_FIELD: ${{ vars.NZLC_SEARCH_FIELD || 'title' }}
          NZLC_SEARCH_SORT_BY: ${{ vars.NZLC_SEARCH_SORT_BY || 'most_recently_updated' }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.min_seconds_between_requests }}" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="${{ inputs.min_seconds_between_requests }}"
          fi
          args=(
            --search-terms "${{ inputs.search_terms }}"
            --legislation-status "${{ inputs.legislation_status }}"
            --legislation-types "${{ inputs.legislation_types }}"
            --output-path generated/historical-work-ids.txt
            --provenance-path generated/historical-work-ids.provenance.json
          )
          if [ -n "${{ inputs.max_pages }}" ]; then args+=(--max-pages "${{ inputs.max_pages }}"); fi
          if [ -n "${{ inputs.max_works }}" ]; then args+=(--max-works "${{ inputs.max_works }}"); fi
          uv run nzlc discover-work-ids "${args[@]}"

      - name: Prepare reviewed historical seed
        if: ${{ inputs.seed_work_ids_path != '' }}
        run: |
          set -euo pipefail
          seed_path="${{ inputs.seed_work_ids_path }}"
          if [ ! -f "$seed_path" ]; then
            echo "Reviewed seed file does not exist: $seed_path" >&2
            exit 1
          fi
          mkdir -p generated
          cp "$seed_path" generated/historical-work-ids.txt
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          seed_path = Path(os.environ["SEED_PATH"])
          work_ids = [
              line.strip()
              for line in seed_path.read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]
          unique = sorted(set(work_ids))
          payload = "".join(f"{work_id}\n" for work_id in unique).encode("utf-8")
          provenance = {
              "schema_version": "1.0",
              "source": "reviewed_seed_file",
              "seed_work_ids_path": seed_path.as_posix(),
              "source_record_count": len(work_ids),
              "unique_record_count": len(unique),
              "seed_sha256": hashlib.sha256(payload).hexdigest(),
              "coverage_warning": (
                  "This seed is only as complete as the reviewed source inventory. "
                  "Do not claim full historical coverage until reconciliation is complete."
              ),
          }
          Path("generated/historical-work-ids.provenance.json").write_text(
              json.dumps(provenance, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          SEED_PATH: ${{ inputs.seed_work_ids_path }}

      - name: Restore existing historical dataset
        if: ${{ inputs.merge_policy == 'restore_merge' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          from huggingface_hub import snapshot_download
          from huggingface_hub.utils import RepositoryNotFoundError

          repo_id = os.environ["HF_HISTORICAL_REPO_ID"]
          token = os.environ.get("HF_TOKEN") or None
          output_dir = Path(os.environ["HISTORICAL_OUTPUT_DIR"])
          output_dir.mkdir(parents=True, exist_ok=True)
          try:
              snapshot = Path(
                  snapshot_download(
                      repo_id=repo_id,
                      repo_type="dataset",
                      token=token,
                      allow_patterns=[
                          "README.md",
                          "records.jsonl",
                          "_state/**",
                          "manifests/**",
                          "parquet/**",
                          "raw_xml/**",
                      ],
                  )
              )
          except RepositoryNotFoundError:
              print(f"No existing historical dataset to restore: {repo_id}")
              raise SystemExit(0)

          restored = []
          for rel in ["README.md", "records.jsonl", "_state", "manifests", "parquet", "raw_xml"]:
              src = snapshot / rel
              dst = output_dir / rel
              if not src.exists():
                  continue
              if src.is_dir():
                  if dst.exists():
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
              else:
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)
              restored.append(rel)
          print(f"Restored {len(restored)} historical dataset path(s): {', '.join(restored)}")
          PY

      - name: Sync historical corpus
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          MERGE_POLICY: ${{ inputs.merge_policy }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.min_seconds_between_requests }}" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="${{ inputs.min_seconds_between_requests }}"
          fi
          args=(
            --seed-work-ids generated/historical-work-ids.txt
            --allow-no-search-terms
          )
          if [ "$MERGE_POLICY" = "replace_existing" ]; then args+=(--replace); fi
          if [ -n "${{ inputs.max_works }}" ]; then args+=(--max-works "${{ inputs.max_works }}"); fi
          uv run nzlc sync "${args[@]}"

      - name: Stage historical dataset card
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          historical_repo_id = os.environ.get("HF_HISTORICAL_REPO_ID")
          output_dir = os.environ.get("HISTORICAL_OUTPUT_DIR")
          if not historical_repo_id:
              raise SystemExit("HF_HISTORICAL_REPO_ID is required.")
          if not output_dir:
              raise SystemExit("HISTORICAL_OUTPUT_DIR is required.")
          dataset_card = textwrap.dedent(f"""\
          ---
          license: other
          language:
          - en
          tags:
          - new-zealand
          - legislation
          - law
          - legal-corpus
          - historical
          - parquet
          pretty_name: New Zealand Legislation Historical Corpus
          ---

          # New Zealand Legislation Historical Corpus

          This dataset is the separate historical publication target for New Zealand legislation records collected through the official New Zealand Legislation API.

          It is distinct from the live partial/API-discovery dataset at `edithatogo/corpus-legislation-nz`. Historical uploads must target `{historical_repo_id}` and must not overwrite the live dataset.

          Coverage is not yet proven complete until the historical bootstrap plan, failed-version state, manifest, and coverage report are reviewed.
          """)
          Path(output_dir, "README.md").write_text(
              dataset_card,
              encoding="utf-8",
          )
          PY

      - name: Validate and summarize historical corpus
        env:
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report

      - name: Record historical publication guardrails
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HISTORICAL_OUTPUT_DIR/manifests"
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          historical_repo_id = os.environ.get("HF_HISTORICAL_REPO_ID")
          output_dir = os.environ.get("HISTORICAL_OUTPUT_DIR")
          if not historical_repo_id:
              raise SystemExit("HF_HISTORICAL_REPO_ID is required.")
          if not output_dir:
              raise SystemExit("HISTORICAL_OUTPUT_DIR is required.")

          policy = {
              "schema_version": "1.0",
              "policy": "manual_historical_upload",
              "historical_huggingface_dataset": historical_repo_id,
              "live_huggingface_dataset": os.environ.get("HF_REPO_ID"),
              "live_dataset_boundary": "verified partial/API-discovery corpus",
              "upload_confirmed": "${{ inputs.upload_confirmed }}",
              "seed_work_ids_path": "${{ inputs.seed_work_ids_path }}",
              "merge_policy": "${{ inputs.merge_policy }}",
              "upload_options": "${{ inputs.upload_options }}",
              "guards": [
                  "HF_HISTORICAL_REPO_ID is required.",
                  "HF_HISTORICAL_REPO_ID must not equal HF_REPO_ID.",
                  "The live partial dataset is explicitly refused as a historical target.",
                  "The workflow has no schedule and defaults to no-upload dry run.",
                  "Confirmed incremental uploads require merge_policy=restore_merge unless merge_policy=replace_existing.",
              ],
          }
          Path(output_dir, "manifests", "publication_policy.json").write_text(
              json.dumps(policy, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: historical-hf-upload-dry-run
          path: |
            generated/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/records.jsonl
            ${{ env.HISTORICAL_OUTPUT_DIR }}/README.md
            ${{ env.HISTORICAL_OUTPUT_DIR }}/manifests/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/_state/
          if-no-files-found: error

      - name: Upload to historical Hugging Face dataset
        if: ${{ inputs.upload_confirmed }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          HF_XET_HIGH_PERFORMANCE: "1"
          UPLOAD_OPTIONS: ${{ inputs.upload_options }}
        run: |
          set -euo pipefail
          args=()
          case ",${UPLOAD_OPTIONS}," in *",force,"*) args+=(--force);; esac
          case ",${UPLOAD_OPTIONS}," in *",private,"*) args+=(--private);; esac
          uv run nzlc hf-upload "${args[@]}"

      - name: Dry-run notice
        if: ${{ !inputs.upload_confirmed }}
        run: |
          set -euo pipefail
          echo "No upload performed. Set upload_confirmed=true only after reviewing the artifact outputs." >> "$GITHUB_STEP_SUMMARY"

      - name: Step summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Historical Hugging Face upload" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: manual only" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload confirmed: ${{ inputs.upload_confirmed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge policy: ${{ inputs.merge_policy }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload options: ${{ inputs.upload_options }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Seed work IDs path: ${{ inputs.seed_work_ids_path }}" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          output_dir = Path(os.environ["HISTORICAL_OUTPUT_DIR"])
          state_path = output_dir / "_state" / "sync_state.json"
          manifest_path = output_dir / "manifests" / "latest_manifest.json"

          if state_path.exists():
              state = json.loads(state_path.read_text(encoding="utf-8"))
              stats = dict(state.get("last_stats", {}))
              warnings = list(stats.pop("warnings", []) or [])
              summary = {
                  "last_stats": stats,
                  "warning_count": len(warnings),
                  "warning_sample": warnings[:20],
                  "records_changed_on_disk": state.get("records_changed_on_disk"),
              }
              print("\n### Sync state")
              print("```json")
              print(json.dumps(summary, indent=2, sort_keys=True))
              print("```")

          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              summary_keys = [
                  "schema_version",
                  "record_schema_version",
                  "record_count",
                  "content_sha256",
                  "manifest_sha256",
                  "generated_at",
              ]
              summary = {key: manifest.get(key) for key in summary_keys if key in manifest}
              print("\n### Manifest")
              print("```json")
              print(json.dumps(summary, indent=2, sort_keys=True))
              print("```")
          PY
