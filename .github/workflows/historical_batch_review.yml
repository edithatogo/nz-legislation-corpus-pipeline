name: Historical batch review

on:
  workflow_dispatch:
    inputs:
      seed_batch_ids_csv:
        description: "Comma-separated reviewed batch IDs, for example 0005,0006,0007"
        type: string
        default: "0005"
      merge_policy:
        description: "Historical merge policy for local restore and sync"
        type: choice
        options:
          - restore_merge
          - replace_existing
        default: restore_merge
      min_seconds_between_requests:
        description: "Optional request spacing override in seconds"
        type: string
        default: "0.5"
      max_works:
        description: "Optional per-batch sync limit; use none for no limit"
        type: string
        default: "none"
      max_parallel:
        description: "Maximum number of batches to run at once"
        type: string
        default: "3"

concurrency:
  group: historical-batch-review-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      batch_count: ${{ steps.plan.outputs.batch_count }}
    steps:
      - uses: actions/checkout@v6

      - name: Build batch matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv
          import json
          import re
          import sys
          from pathlib import Path

          raw = "${{ inputs.seed_batch_ids_csv }}"
          batch_ids = [item.strip() for item in raw.split(",") if item.strip()]
          if not batch_ids:
              raise SystemExit("seed_batch_ids_csv must contain at least one batch ID")

          include = []
          for batch_id in batch_ids:
              if not re.fullmatch(r"\d{4}", batch_id):
                  raise SystemExit(f"Invalid batch ID: {batch_id!r}; expected four digits")
              seed_path = Path(f"seeds/reviewed/historical-work-ids-{batch_id}.txt")
              if not seed_path.is_file():
                  raise SystemExit(f"Missing reviewed seed file: {seed_path.as_posix()}")
              include.append(
                  {
                      "batch_id": batch_id,
                      "seed_work_ids_path": seed_path.as_posix(),
                  }
              )

          print(f"batch_count={len(include)}")
          print("matrix=" + json.dumps({"include": include}))
          PY

  batch:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    env:
      HISTORICAL_OUTPUT_DIR: data-historical-upload
    steps:
      - uses: actions/checkout@v6

      - name: Guard historical dataset target
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python scripts/historical_workflow_helpers.py guard-target \
            --historical-repo-id "${HF_HISTORICAL_REPO_ID:-}" \
            --live-repo-id "${HF_REPO_ID:-}" \
            --summary-path "$GITHUB_STEP_SUMMARY"
          {
            echo "Batch ID: ${{ matrix.batch_id }}"
            echo "Seed work IDs path: ${{ matrix.seed_work_ids_path }}"
            echo "Merge policy: ${{ inputs.merge_policy }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Prepare reviewed historical seed
        shell: bash
        run: |
          set -euo pipefail
          seed_path="${{ matrix.seed_work_ids_path }}"
          mkdir -p generated
          cp "$seed_path" generated/historical-work-ids.txt
          uv run python scripts/historical_workflow_helpers.py seed-provenance \
            --seed-path "$seed_path" \
            --output-path generated/historical-work-ids.provenance.json

      - name: Restore existing historical dataset
        if: ${{ inputs.merge_policy == 'restore_merge' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import shutil
          import time
          from pathlib import Path

          from huggingface_hub import snapshot_download
          from huggingface_hub.utils import HfHubHTTPError, LocalEntryNotFoundError, RepositoryNotFoundError

          repo_id = os.environ["HF_HISTORICAL_REPO_ID"]
          token = os.environ.get("HF_TOKEN") or None
          output_dir = Path(os.environ["HISTORICAL_OUTPUT_DIR"])
          output_dir.mkdir(parents=True, exist_ok=True)

          allow_patterns = [
              "README.md",
              "records.jsonl",
              "_state/**",
              "manifests/**",
              "parquet/**",
              "raw_xml/**",
          ]
          snapshot = None
          for attempt in range(1, 6):
              try:
                  snapshot = Path(
                      snapshot_download(
                          repo_id=repo_id,
                          repo_type="dataset",
                          token=token,
                          allow_patterns=allow_patterns,
                      )
                  )
                  break
              except RepositoryNotFoundError:
                  print(f"No existing historical dataset to restore: {repo_id}")
                  raise SystemExit(0)
              except (HfHubHTTPError, LocalEntryNotFoundError) as exc:
                  if attempt == 5:
                      raise
                  sleep_seconds = min(300, 30 * attempt)
                  print(
                      f"Historical dataset restore failed on attempt {attempt}: {exc}. "
                      f"Retrying in {sleep_seconds}s."
                  )
                  time.sleep(sleep_seconds)
          if snapshot is None:
              raise SystemExit("Historical dataset restore did not produce a snapshot path.")

          restored = []
          for rel in ["README.md", "records.jsonl", "_state", "manifests", "parquet", "raw_xml"]:
              src = snapshot / rel
              dst = output_dir / rel
              if not src.exists():
                  continue
              if src.is_dir():
                  if dst.exists():
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
              else:
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)
              restored.append(rel)
          print(f"Restored {len(restored)} historical dataset path(s): {', '.join(restored)}")
          PY

      - name: Sync historical corpus
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          MERGE_POLICY: ${{ inputs.merge_policy }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.min_seconds_between_requests }}" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="${{ inputs.min_seconds_between_requests }}"
          fi
          args=(
            --seed-work-ids "${{ matrix.seed_work_ids_path }}"
            --allow-no-search-terms
          )
          if [ "$MERGE_POLICY" = "replace_existing" ]; then
            args+=(--replace)
          fi
          if [ -n "${{ inputs.max_works }}" ] && [ "${{ inputs.max_works }}" != "none" ] && [ "${{ inputs.max_works }}" != "null" ] && [ "${{ inputs.max_works }}" != "-" ]; then
            args+=(--max-works "${{ inputs.max_works }}")
          fi
          uv run nzlc sync "${args[@]}"

      - name: Stage historical dataset card
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          historical_repo_id = os.environ.get("HF_HISTORICAL_REPO_ID")
          output_dir = os.environ.get("HISTORICAL_OUTPUT_DIR")
          if not historical_repo_id:
              raise SystemExit("HF_HISTORICAL_REPO_ID is required.")
          if not output_dir:
              raise SystemExit("HISTORICAL_OUTPUT_DIR is required.")
          dataset_card = textwrap.dedent(f"""\
          ---
          license: other
          language:
          - en
          tags:
          - new-zealand
          - legislation
          - law
          - legal-corpus
          - historical
          - parquet
          pretty_name: New Zealand Legislation Historical Corpus
          ---

          # New Zealand Legislation Historical Corpus

          This dataset is the separate historical publication target for New Zealand legislation records collected through the official New Zealand Legislation API.

          It is distinct from the live partial/API-discovery dataset at `edithatogo/corpus-legislation-nz`. Historical uploads must target `{historical_repo_id}` and must not overwrite the live dataset.

          Coverage is not yet proven complete until the historical bootstrap plan, failed-version state, manifest, and coverage report are reviewed.
          """)
          Path(output_dir, "README.md").write_text(
              dataset_card,
              encoding="utf-8",
          )
          PY

      - name: Validate and summarize historical corpus
        env:
          NZLC_OUTPUT_DIR: ${{ env.HISTORICAL_OUTPUT_DIR }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
        run: |
          set -euo pipefail
          uv run nzlc validate
          uv run nzlc manifest
          uv run nzlc coverage-report

      - name: Record historical publication guardrails
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python scripts/historical_workflow_helpers.py publication-policy \
            --historical-repo-id "${HF_HISTORICAL_REPO_ID:-}" \
            --live-repo-id "${HF_REPO_ID:-}" \
            --seed-work-ids-path "${{ matrix.seed_work_ids_path }}" \
            --merge-policy "${{ inputs.merge_policy }}" \
            --output-dir "$HISTORICAL_OUTPUT_DIR"

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: historical-hf-batch-${{ matrix.batch_id }}-dry-run
          path: |
            generated/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/records.jsonl
            ${{ env.HISTORICAL_OUTPUT_DIR }}/README.md
            ${{ env.HISTORICAL_OUTPUT_DIR }}/manifests/
            ${{ env.HISTORICAL_OUTPUT_DIR }}/_state/
          if-no-files-found: error

      - name: Batch summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Historical batch review" >> "$GITHUB_STEP_SUMMARY"
          echo "- Batch ID: ${{ matrix.batch_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Seed work IDs path: ${{ matrix.seed_work_ids_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merge policy: ${{ inputs.merge_policy }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload step: skipped in review workflow" >> "$GITHUB_STEP_SUMMARY"
