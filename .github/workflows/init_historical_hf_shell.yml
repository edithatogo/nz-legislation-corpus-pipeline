name: Initialize historical Hugging Face shell

on:
  workflow_dispatch:
    inputs:
      private:
        description: "Create the historical dataset repo as private if missing"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  init-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Guard historical dataset target
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          if [ -z "${HF_HISTORICAL_REPO_ID:-}" ]; then
            echo "HF_HISTORICAL_REPO_ID must be configured as a repository variable." >&2
            exit 1
          fi
          if [ -n "${HF_REPO_ID:-}" ] && [ "$HF_HISTORICAL_REPO_ID" = "$HF_REPO_ID" ]; then
            echo "HF_HISTORICAL_REPO_ID must not equal HF_REPO_ID." >&2
            exit 1
          fi
          case "$HF_HISTORICAL_REPO_ID" in
            "edithatogo/nz-legislation-corpus")
              echo "Refusing to initialize the live partial dataset as the historical target." >&2
              exit 1
              ;;
          esac
          echo "Historical dataset target: $HF_HISTORICAL_REPO_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Initialize historical dataset shell
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_PRIVATE: ${{ inputs.private }}
        run: |
          set -euo pipefail
          ./scripts/create_huggingface_dataset_repo.sh "$HF_REPO_ID"
          {
            echo "Initialized historical Hugging Face dataset shell."
            echo "Dataset: https://huggingface.co/datasets/$HF_REPO_ID"
          } >> "$GITHUB_STEP_SUMMARY"
