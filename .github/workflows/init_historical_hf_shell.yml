name: Initialize historical Hugging Face shell

on:
  workflow_dispatch:
    inputs:
      private:
        description: "Create the historical dataset repo as private if missing"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  init-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Guard historical dataset target
        env:
          HF_HISTORICAL_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python scripts/historical_workflow_helpers.py guard-target \
            --historical-repo-id "${HF_HISTORICAL_REPO_ID:-}" \
            --live-repo-id "${HF_REPO_ID:-}" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Initialize historical dataset shell
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_HISTORICAL_REPO_ID }}
          HF_PRIVATE: ${{ inputs.private }}
        run: |
          set -euo pipefail
          bash ./scripts/create_huggingface_dataset_repo.sh "$HF_REPO_ID"
          {
            echo "Initialized historical Hugging Face dataset shell."
            echo "Dataset: https://huggingface.co/datasets/$HF_REPO_ID"
          } >> "$GITHUB_STEP_SUMMARY"
