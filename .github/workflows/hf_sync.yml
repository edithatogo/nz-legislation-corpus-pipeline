name: Hugging Face live sync

on:
  schedule:
    - cron: "17 14 * * *" # daily, safely outside NZ midnight API reset rush
  workflow_dispatch:
    inputs:
      latest_only:
        description: "Only sync latest matching version for discovered works"
        type: boolean
        default: false
      max_works:
        description: "Optional smoke-test limit"
        type: string
        default: ""
      min_seconds_between_requests:
        description: "Optional request spacing override in seconds"
        type: string
        default: ""

concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Doctor
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          ARCHIVE_CREATORS_JSON: ${{ vars.ARCHIVE_CREATORS_JSON }}
        run: |
          set -euo pipefail
          uv run nzlc doctor

      - name: Restore current live corpus from Hugging Face
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          snapshot_download(
              repo_id=os.environ["HF_REPO_ID"],
              repo_type="dataset",
              token=os.environ.get("HF_TOKEN"),
              local_dir="data",
          )
          PY
          rm -rf data/.cache

      - name: Sync corpus from NZ Legislation API
        env:
          NZ_LEGISLATION_API_KEY: ${{ secrets.NZ_LEGISLATION_API_KEY }}
          NZLC_SEARCH_TERMS: ${{ vars.NZLC_SEARCH_TERMS }}
          NZLC_SEARCH_FIELD: ${{ vars.NZLC_SEARCH_FIELD || 'title' }}
          NZLC_SEARCH_SORT_BY: ${{ vars.NZLC_SEARCH_SORT_BY || 'most_recently_updated' }}
          NZLC_LEGISLATION_TYPES: ${{ vars.NZLC_LEGISLATION_TYPES }}
          NZLC_LEGISLATION_STATUS: ${{ vars.NZLC_LEGISLATION_STATUS }}
          NZLC_PUBLISHER: ${{ vars.NZLC_PUBLISHER }}
          NZLC_OUTPUT_DIR: data
          NZLC_MANUAL_MAX_WORKS: ${{ github.event.inputs.max_works || '' }}
          NZLC_SCHEDULE_MAX_WORKS: ${{ vars.NZLC_SCHEDULE_MAX_WORKS || '5' }}
          NZLC_MANUAL_MIN_SECONDS_BETWEEN_REQUESTS: ${{ github.event.inputs.min_seconds_between_requests || '' }}
          NZLC_SCHEDULE_MIN_SECONDS_BETWEEN_REQUESTS: ${{ vars.NZLC_SCHEDULE_MIN_SECONDS_BETWEEN_REQUESTS || '1.0' }}
        run: |
          set -euo pipefail
          args=()
          if [ "${{ github.event.inputs.latest_only || 'false' }}" = "true" ]; then args+=(--latest-only); fi
          if [ -n "$NZLC_MANUAL_MAX_WORKS" ]; then
            args+=(--max-works "$NZLC_MANUAL_MAX_WORKS")
          elif [ "${{ github.event_name }}" = "schedule" ] && [ -n "$NZLC_SCHEDULE_MAX_WORKS" ]; then
            args+=(--max-works "$NZLC_SCHEDULE_MAX_WORKS")
          fi
          if [ -n "$NZLC_MANUAL_MIN_SECONDS_BETWEEN_REQUESTS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_MANUAL_MIN_SECONDS_BETWEEN_REQUESTS"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ -n "$NZLC_SCHEDULE_MIN_SECONDS_BETWEEN_REQUESTS" ]; then
            export NZLC_MIN_SECONDS_BETWEEN_REQUESTS="$NZLC_SCHEDULE_MIN_SECONDS_BETWEEN_REQUESTS"
          fi
          uv run nzlc sync "${args[@]}"

      - name: Stage Hugging Face dataset card
        run: |
          set -euo pipefail
          cp DATASET_CARD.md data/README.md

      - name: Validate corpus
        env:
          NZLC_OUTPUT_DIR: data
        run: |
          set -euo pipefail
          uv run nzlc validate

      - name: Build manifest
        env:
          NZLC_OUTPUT_DIR: data
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run nzlc manifest
          uv run nzlc coverage-report

      - name: Upload to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          NZLC_OUTPUT_DIR: data
          HF_XET_HIGH_PERFORMANCE: "1"
        run: |
          set -euo pipefail
          uv run nzlc hf-upload

      - name: Verify uploaded manifest matches remote
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          from huggingface_hub import hf_hub_download

          local = Path("data/manifests/latest_manifest.json")
          remote_path = Path(hf_hub_download(
              repo_id=os.environ["HF_REPO_ID"],
              repo_type="dataset",
              filename="manifests/latest_manifest.json",
              token=os.environ.get("HF_TOKEN"),
          ))
          local_bytes = local.read_bytes()
          remote_bytes = remote_path.read_bytes()
          summary = {
              "local_manifest_sha256": hashlib.sha256(local_bytes).hexdigest(),
              "remote_manifest_sha256": hashlib.sha256(remote_bytes).hexdigest(),
              "matches": local_bytes == remote_bytes,
          }
          print(json.dumps(summary, indent=2, sort_keys=True))
          if not summary["matches"]:
              raise SystemExit("Remote manifest does not match local manifest after upload")
          PY

      - name: Step summary
        if: always()
        run: |
          set -euo pipefail
          echo "## NZ Legislation corpus sync" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/_state/sync_state.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat data/_state/sync_state.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f data/manifests/latest_changes.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat data/manifests/latest_changes.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
